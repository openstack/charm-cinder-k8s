bundle: kubernetes
series: jammy
applications:

  mysql:
    charm: ch:mysql-k8s
    channel: edge
    scale: 1
    trust: false
    series: focal

  # Currently traefik is required for networking things.
  # If this isn't present, the units will hang at "installing agent".
  traefik:
    charm: ch:traefik-k8s
    channel: 1.0/stable
    scale: 1
    trust: true
    series: focal

  rabbitmq:
    charm: ch:rabbitmq-k8s
    channel: 3.9/edge
    scale: 1
    trust: true

  keystone:
    charm: ch:keystone-k8s
    channel: xena/edge
    scale: 1
    trust: true
    options:
      admin-role: admin
    storage:
      fernet-keys: 5M
      credential-keys: 5M

  cinder:
    charm: ../../cinder-k8s.charm
    scale: 1
    trust: true
    resources:
      cinder-api-image: docker.io/kolla/ubuntu-binary-cinder-api:xena
      cinder-scheduler-image: docker.io/kolla/ubuntu-binary-cinder-scheduler:xena

relations:
- - traefik:ingress
  - keystone:ingress-public

- - mysql:database
  - keystone:database

- - mysql:database
  - cinder:database
- - keystone:identity-service
  - cinder:identity-service
- - traefik:ingress
  - cinder:ingress-public
